apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: authelia
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: flux-system
  values:
    pod:
      kind: Deployment
      replicas: 1
      extraVolumes:
        - name: users
          secret:
            secretName: authelia-users
            items:
              - key: users.yaml
                path: users.yaml
        - name: oidc-private-key
          secret:
            secretName: authelia-oidc-private-key
            items:
              - key: private.key
                path: private.key
        - name: oidc-clients
          secret:
            secretName: authelia-oidc-clients
      extraVolumeMounts:
        - name: users
          mountPath: /config/users.yaml
          subPath: users.yaml
          readOnly: true
        - name: oidc-private-key
          mountPath: /config/oidc.key
          subPath: private.key
          readOnly: true
        - name: oidc-clients
          mountPath: /config/oidc-clients
          readOnly: true
    secret:
      existingSecret: authelia-secret
    configMap:
      theme: dark
      authentication_backend:
        password_reset:
          disable: true
        file:
          enabled: true
          path: /config/users.yaml
      session:
        expiration: 1h
        inactivity: 7d
        cookies:
          - subdomain: auth
            domain: pedrocoutinho.eu
      regulation:
        max_retries: 5
        find_time: 2m
        ban_time: 10m
      storage:
        postgres:
          enabled: true
          address: tcp://homelab-postgres-rw.postgres:5432
          database: authelia
          username: forgejo
      notifier:
        disable_startup_check: true
        filesystem:
          enabled: true
          filename: /config/notification.txt
      access_control:
        default_policy: two_factor
        rules:
          - domain: auth.pedrocoutinho.eu
            policy: bypass
          - domain: forgejo.pedrocoutinho.eu
            policy: bypass
          - domain: headplane.pedrocoutinho.eu
            policy: bypass
      identity_providers:
        oidc:
          enabled: true
          jwks:
            - key_id: main
              algorithm: RS256
              use: sig
              key:
                path: /config/oidc.key
          clients:
            - client_id: grafana
              client_name: Grafana
              client_secret:
                path: /config/oidc-clients/GRAFANA_CLIENT_SECRET
              public: false
              authorization_policy: two_factor
              redirect_uris:
                - https://grafana.pedrocoutinho.eu/login/generic_oauth
              scopes:
                - openid
                - profile
                - groups
                - email
              userinfo_signed_response_alg: none
            - client_id: forgejo
              client_name: Forgejo
              client_secret:
                path: /config/oidc-clients/FORGEJO_CLIENT_SECRET
              public: false
              authorization_policy: two_factor
              redirect_uris:
                - https://forgejo.pedrocoutinho.eu/user/oauth2/authelia/callback
              scopes:
                - openid
                - profile
                - groups
                - email
              userinfo_signed_response_alg: none
            - client_id: headplane
              client_name: Headplane
              client_secret:
                path: /config/oidc-clients/HEADPLANE_CLIENT_SECRET
              public: false
              authorization_policy: two_factor
              redirect_uris:
                - https://headplane.pedrocoutinho.eu/admin/oidc/callback
              scopes:
                - openid
                - profile
                - email
              userinfo_signed_response_alg: none
