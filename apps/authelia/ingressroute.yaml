apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: authelia
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.pedrocoutinho.eu`)
      kind: Rule
      services:
        - name: authelia
          port: 9091
  tls:
    secretName: homelab-wildcard-tls
