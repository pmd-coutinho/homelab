apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            kubernetes.io/hostname: talos-worker
        containers:
          main:
            image:
              repository: twinproduction/gatus
              tag: latest
            env:
              TELEGRAM_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: gatus-telegram
                    key: bot-token
            resources:
              requests:
                memory: 32Mi
                cpu: 25m
              limits:
                memory: 64Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    persistence:
      config:
        type: configMap
        name: gatus-config
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
      data:
        type: emptyDir
        globalMounts:
          - path: /data
