apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headplane
  namespace: headplane
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`headplane.pedrocoutinho.eu`)
      kind: Rule
      middlewares:
        - name: authelia
          namespace: traefik
      services:
        - name: headplane
          port: 3000
  tls:
    secretName: homelab-wildcard-tls
