apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headscale
  namespace: headscale
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: headscale/headscale
              tag: 0.25.1
            args: ["serve"]
            resources:
              requests:
                memory: 100Mi
                cpu: 50m
              limits:
                memory: 256Mi
    persistence:
      config:
        type: secret
        name: headscale-config
        globalMounts:
          - path: /etc/headscale/config.yaml
            subPath: config.yaml
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        dataSourceRef: null
        volumeClaimSpec:
          accessModes:
            - ReadWriteOnce
          storageClassName: longhorn
          resources:
            requests:
              storage: 3Gi
        globalMounts:
          - path: /var/lib/headscale
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
          grpc:
            port: 50443
          metrics:
            port: 9090
