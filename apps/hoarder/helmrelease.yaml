apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hoarder
  namespace: hoarder
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            kubernetes.io/hostname: talos-worker
        containers:
          main:
            image:
              repository: ghcr.io/hoarder-app/hoarder
              tag: release
            env:
              NEXTAUTH_URL: https://hoarder.pedrocoutinho.eu
              MEILI_ADDR: http://localhost:7700
              BROWSER_WEB_URL: http://localhost:9222
              DISABLE_SIGNUPS: "false"
              OAUTH_PROVIDER_NAME: Authelia
              OAUTH_CLIENT_ID: hoarder
              OAUTH_WELLKNOWN_URL: http://authelia.authelia.svc.cluster.local/.well-known/openid-configuration
              NEXTAUTH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: hoarder-secret
                    key: NEXTAUTH_SECRET
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: hoarder-secret
                    key: DATABASE_URL
              MEILI_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: hoarder-secret
                    key: MEILI_MASTER_KEY
              OAUTH_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: hoarder-secret
                    key: OAUTH_CLIENT_SECRET
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 512Mi
          meilisearch:
            image:
              repository: getmeili/meilisearch
              tag: v1.11.1
            env:
              MEILI_NO_ANALYTICS: "true"
              MEILI_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: hoarder-secret
                    key: MEILI_MASTER_KEY
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 256Mi
          chrome:
            image:
              repository: gcr.io/zenika-hub/alpine-chrome
              tag: "123"
            command:
              - chromium-browser
            args:
              - --headless
              - --no-sandbox
              - --disable-gpu
              - --disable-dev-shm-usage
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 256Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
      meili-data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        advancedMounts:
          main:
            meilisearch:
              - path: /meili_data
