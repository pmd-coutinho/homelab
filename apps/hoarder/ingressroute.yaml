apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hoarder
  namespace: hoarder
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hoarder.pedrocoutinho.eu`)
      kind: Rule
      services:
        - name: hoarder
          port: 3000
  tls:
    store:
      name: default
