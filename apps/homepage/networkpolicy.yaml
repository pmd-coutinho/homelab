apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: homepage-policy
  namespace: homepage
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
