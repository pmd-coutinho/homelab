apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            memory: 400Mi
            cpu: 200m
          limits:
            memory: 1536Mi
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 10Gi
    grafana:
      resources:
        requests:
          memory: 200Mi
          cpu: 100m
        limits:
          memory: 384Mi
      sidecar:
        dashboards:
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
        datasources:
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi
      envFromSecret: grafana-oidc-secret
      grafana.ini:
        server:
          domain: grafana.pedrocoutinho.eu
          root_url: https://grafana.pedrocoutinho.eu
        auth.generic_oauth:
          enabled: true
          name: Authelia
          icon: signin
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email groups
          empty_scopes: false
          auth_url: https://auth.pedrocoutinho.eu/api/oidc/authorization
          token_url: https://auth.pedrocoutinho.eu/api/oidc/token
          api_url: https://auth.pedrocoutinho.eu/api/oidc/userinfo
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          name_attribute_path: name
          use_pkce: true
          use_id_token: true
          role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
        auth:
          disable_login_form: false
          oauth_auto_login: true
    kube-state-metrics:
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 128Mi
    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 1Gi
