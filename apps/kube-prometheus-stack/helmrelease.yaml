apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    defaultRules:
      disabled:
        KubeProxyDown: true
        KubeMemoryOvercommit: true
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    prometheusOperator:
      admissionWebhooks:
        enabled: false
    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.pedrocoutinho.eu
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            memory: 400Mi
            cpu: 200m
          limits:
            memory: 1536Mi
        nodeSelector:
          kubernetes.io/hostname: talos-worker
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 10Gi
    grafana:
      nodeSelector:
        kubernetes.io/hostname: talos-worker
      resources:
        requests:
          memory: 200Mi
          cpu: 100m
        limits:
          memory: 512Mi
      sidecar:
        dashboards:
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
        datasources:
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 2Gi
      envFromSecret: grafana-oidc-secret
      grafana.ini:
        server:
          domain: grafana.pedrocoutinho.eu
          root_url: https://grafana.pedrocoutinho.eu
        auth.generic_oauth:
          enabled: true
          name: Authelia
          icon: signin
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email groups
          empty_scopes: false
          auth_url: https://auth.pedrocoutinho.eu/api/oidc/authorization
          token_url: https://auth.pedrocoutinho.eu/api/oidc/token
          api_url: https://auth.pedrocoutinho.eu/api/oidc/userinfo
          login_attribute_path: preferred_username
          groups_attribute_path: groups
          name_attribute_path: name
          use_pkce: true
          use_id_token: true
          role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
          auto_assign_org_role: true
          allow_assign_grafana_admin: true
        auth:
          disable_login_form: false
          oauth_auto_login: true
    kube-state-metrics:
      nodeSelector:
        kubernetes.io/hostname: talos-worker
      startupProbe:
        httpGet:
          path: /livez
          port: http
          scheme: HTTP
        failureThreshold: 30
        periodSeconds: 10
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /readyz
          port: metrics
          scheme: HTTP
        failureThreshold: 6
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /livez
          port: http
          scheme: HTTP
        failureThreshold: 6
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 128Mi
    alertmanager:
      templateFiles:
        telegram.tmpl: |-
          {{ define "telegram.message" }}
          {{ if eq .Status "firing" }}🔥 <b>Firing</b>{{ else }}✅ <b>Resolved</b>{{ end }}
          {{ range .Alerts }}
          <b>{{ .Labels.alertname }}</b> [{{ .Labels.severity }}]
          {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ end }}
          {{ end }}
          {{ end }}
      config:
        route:
          receiver: telegram
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        receivers:
          - name: "null"
          - name: telegram
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
                chat_id: 371232688
                parse_mode: HTML
                message: '{{ template "telegram.message" . }}'
                send_resolved: true
      alertmanagerSpec:
        externalUrl: https://alertmanager.pedrocoutinho.eu
        secrets:
          - alertmanager-telegram
        nodeSelector:
          kubernetes.io/hostname: talos-worker
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-single
              resources:
                requests:
                  storage: 1Gi
