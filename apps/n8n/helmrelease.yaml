apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        replicas: 1
        pod:
          nodeSelector:
            kubernetes.io/hostname: talos-worker
        initContainers:
          init-permissions:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - chown -R 1000:1000 /data
        containers:
          main:
            image:
              repository: docker.n8n.io/n8nio/n8n
              tag: "1.90.2"
            env:
              DB_TYPE: postgresdb
              DB_POSTGRESDB_HOST: homelab-postgres-rw.postgres
              DB_POSTGRESDB_PORT: "5432"
              DB_POSTGRESDB_DATABASE: n8n
              DB_POSTGRESDB_USER: forgejo
              DB_POSTGRESDB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: n8n-secret
                    key: DB_POSTGRESDB_PASSWORD
              N8N_ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: n8n-secret
                    key: N8N_ENCRYPTION_KEY
              N8N_HOST: n8n.pedrocoutinho.eu
              N8N_PORT: "5678"
              N8N_PROTOCOL: https
              N8N_EDITOR_BASE_URL: https://n8n.pedrocoutinho.eu
              WEBHOOK_URL: https://n8n-webhook.pedrocoutinho.eu
              N8N_PROXY_HOPS: "1"
              N8N_SECURE_COOKIE: "true"
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
              N8N_RUNNERS_ENABLED: "true"
              TZ: Europe/Lisbon
              GENERIC_TIMEZONE: Europe/Lisbon
              N8N_DIAGNOSTICS_ENABLED: "false"
              N8N_PERSONALIZATION_ENABLED: "false"
              N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5678
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5678
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5678
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 1Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 5678
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: longhorn
        advancedMounts:
          main:
            init-permissions:
              - path: /data
            main:
              - path: /home/node/.n8n
