apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otterwiki
  namespace: otterwiki
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: redimp/otterwiki
              tag: "2"
            env:
              OTTERWIKI_SETTINGS: /app-data/settings.cfg
              AUTH_METHOD: PROXY_HEADER
              SITE_NAME: Wiki
              READ_ACCESS: ANONYMOUS
              WRITE_ACCESS: REGISTERED
              ATTACHMENT_ACCESS: REGISTERED
              ADMIN_ACCESS: ADMIN
              AUTO_APPROVAL: "true"
              PROXY_HEADER_NAME: Remote-User
              PROXY_HEADER_EMAIL: Remote-Email
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 128Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: longhorn
        globalMounts:
          - path: /app-data
