apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: otterwiki-policy
  namespace: otterwiki
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toCIDR:
        - 192.168.50.51/32
      toPorts:
        - ports:
            - port: "22"
              protocol: TCP
