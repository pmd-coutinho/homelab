apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: tailscale/tailscale
              tag: latest
            env:
              TS_KUBE_SECRET: ""
              TS_USERSPACE: "true"
              TS_EXTRA_ARGS: "--login-server=https://headscale.pedrocoutinho.eu --advertise-routes=192.168.50.0/24 --accept-routes"
              TS_AUTHKEY:
                valueFrom:
                  secretKeyRef:
                    name: tailscale-auth
                    key: TS_AUTHKEY
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 128Mi
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: longhorn
        globalMounts:
          - path: /var/lib/tailscale
    service:
      main:
        controller: main
        ports:
          http:
            port: 2000
