apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: app-template
      version: "3.7.3"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        replicas: 1
        pod:
          nodeSelector:
            kubernetes.io/hostname: talos-worker
        containers:
          main:
            image:
              repository: vaultwarden/server
              tag: "1.35.4"
            env:
              DOMAIN: https://vaultwarden.pedrocoutinho.eu
              SIGNUPS_ALLOWED: "false"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-db-secret
                    key: DATABASE_URL
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 128Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: longhorn
        globalMounts:
          - path: /data
