apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: homelab-pool
spec:
  blocks:
    - start: 192.168.50.50
      stop: 192.168.50.52
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default
spec:
  interfaces:
    - ^eth[0-9]+
    - ^ens[0-9]+
  externalIPs: true
  loadBalancerIPs: true
