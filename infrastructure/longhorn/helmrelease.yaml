apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    metrics:
      serviceMonitor:
        enabled: true
    defaultSettings:
      defaultReplicaCount: 1
      guaranteedInstanceManagerCPU: 5
      storageReservedPercentageForDefaultDisk: 10
