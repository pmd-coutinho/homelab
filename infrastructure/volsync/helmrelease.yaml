apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: volsync-system
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      sourceRef:
        kind: HelmRepository
        name: backube
        namespace: flux-system
  values:
    metrics:
      disableAuth: true
